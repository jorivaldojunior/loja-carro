<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>GM Repasses | Detalhes do Veículo</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS da página de detalhes -->
    <link rel="stylesheet" href="detalhes-veiculo.css">
</head>
<body class="dark-theme">
    <!-- Header minimalista (responsivo) -->
    <div class="bg-black border-b border-gray-800 px-3 sm:px-4 py-2 sticky top-0 z-10">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2 sm:gap-3">
                <button onclick="voltar()" class="btn-icon">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <span class="text-xs sm:text-sm text-gray-400 truncate max-w-[150px] sm:max-w-xs" id="veiculoTitulo">Carregando...</span>
            </div>
            
            <div class="flex items-center gap-1 sm:gap-2">
                <!-- BOTÃO DE TEMA -->
                <button onclick="toggleTheme()" class="theme-toggle" id="themeToggle" title="Alternar tema">
                    <i class="fas fa-sun"></i>
                </button>
                
                <button onclick="ativarTelaCheia()" class="btn-icon">
                    <i class="fas fa-expand"></i>
                </button>
                
                <!-- Botão de editar/salvar -->
                <div id="editActions" class="flex items-center gap-1 sm:gap-2">
                    <button onclick="toggleEdit()" id="editBtn" class="btn-icon">
                        <i class="fas fa-pen"></i>
                    </button>
                </div>
                
                <button onclick="excluir()" class="btn-icon danger">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Conteúdo -->
    <div class="max-w-6xl mx-auto p-3 sm:p-4">
        
        <!-- Galeria -->
        <div class="mb-3 sm:mb-4">
            <div class="gallery-main" id="galleryMain">
                <div class="gallery-nav prev" onclick="mudarSlide(-1)">
                    <i class="fas fa-chevron-left"></i>
                </div>
                <div class="gallery-nav next" onclick="mudarSlide(1)">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </div>
            
            <div class="gallery-thumbs" id="galleryThumbs"></div>
        </div>

        <!-- Status e ações rápidas -->
        <div class="flex items-center justify-between mb-3">
            <div id="statusContainer">
                <!-- Badge será inserido via JS -->
            </div>
            
            <div id="statusButtons" class="flex gap-1 text-xs">
                <button onclick="mudarStatus('Disponível')" class="px-2 py-1 rounded border border-green-500/30 text-green-500 hover:bg-green-500/10 text-xs sm:text-sm">Disp</button>
                <button onclick="mudarStatus('Reservado')" class="px-2 py-1 rounded border border-yellow-500/30 text-yellow-500 hover:bg-yellow-500/10 text-xs sm:text-sm">Res</button>
                <button onclick="mudarStatus('Vendido')" class="px-2 py-1 rounded border border-red-500/30 text-red-500 hover:bg-red-500/10 text-xs sm:text-sm">Vend</button>
            </div>
        </div>

        <!-- Grid de informações - TODAS VISÍVEIS, editáveis inline -->
        <div class="info-grid mb-3">
            <!-- Marca -->
            <div class="info-item">
                <div class="info-label"><i class="fas fa-tag"></i> Marca</div>
                <div id="marcaDisplay" class="info-value display-field" onclick="if(editMode) selectField(this)">-</div>
                <input type="text" id="marcaEdit" class="edit-field hidden" value="" placeholder="Toyota">
            </div>
            
            <!-- Modelo -->
            <div class="info-item">
                <div class="info-label"><i class="fas fa-car"></i> Modelo</div>
                <div id="modeloDisplay" class="info-value display-field" onclick="if(editMode) selectField(this)">-</div>
                <input type="text" id="modeloEdit" class="edit-field hidden" value="" placeholder="Corolla">
            </div>
            
            <!-- Ano -->
            <div class="info-item">
                <div class="info-label"><i class="fas fa-calendar"></i> Ano</div>
                <div id="anoDisplay" class="info-value display-field" onclick="if(editMode) selectField(this)">-</div>
                <input type="text" id="anoEdit" class="edit-field hidden" value="" placeholder="2022">
            </div>
            
            <!-- Cor -->
            <div class="info-item">
                <div class="info-label"><i class="fas fa-palette"></i> Cor</div>
                <div id="corDisplay" class="info-value display-field" onclick="if(editMode) selectField(this)">-</div>
                <input type="text" id="corEdit" class="edit-field hidden" value="" placeholder="Preto">
            </div>
            
            <!-- KM -->
            <div class="info-item">
                <div class="info-label"><i class="fas fa-tachometer-alt"></i> KM</div>
                <div id="kmDisplay" class="info-value display-field" onclick="if(editMode) selectField(this)">-</div>
                <input type="text" id="kmEdit" class="edit-field hidden" value="" placeholder="25000">
            </div>
            
            <!-- Placa -->
            <div class="info-item">
                <div class="info-label"><i class="fas fa-barcode"></i> Placa</div>
                <div id="placaDisplay" class="info-value display-field" onclick="if(editMode) selectField(this)">-</div>
                <input type="text" id="placaEdit" class="edit-field hidden" value="" placeholder="ABC1234" style="text-transform:uppercase">
            </div>
            
            <!-- Combustível -->
            <div class="info-item">
                <div class="info-label"><i class="fas fa-gas-pump"></i> Combustível</div>
                <div id="combustivelDisplay" class="info-value display-field" onclick="if(editMode) selectField(this)">-</div>
                <select id="combustivelEdit" class="edit-field hidden">
                    <option value="Gasolina">Gasolina</option>
                    <option value="Etanol">Etanol</option>
                    <option value="Flex">Flex</option>
                    <option value="Diesel">Diesel</option>
                    <option value="Elétrico">Elétrico</option>
                    <option value="Híbrido">Híbrido</option>
                </select>
            </div>
            
            <!-- Data Compra -->
            <div class="info-item">
                <div class="info-label"><i class="fas fa-calendar-alt"></i> Data Compra</div>
                <div id="dataCompraDisplay" class="info-value display-field" onclick="if(editMode) selectField(this)">-</div>
                <input type="date" id="dataCompraEdit" class="edit-field hidden">
            </div>
        </div>

        <!-- Linha de Valores + FIPE -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
            <!-- Valores (Compra, Venda, Lucro) -->
            <div class="grid grid-cols-3 gap-2">
                <div class="valor-card">
                    <span class="text-xs text-gray-500">Compra</span>
                    <div id="compraDisplay" class="text-xs sm:text-sm font-bold display-field" onclick="if(editMode) selectField(this)">R$ 0</div>
                    <input type="text" id="compraEdit" class="edit-field hidden text-xs sm:text-sm font-bold" value="" placeholder="85000">
                </div>
                <div class="valor-card">
                    <span class="text-xs text-gray-500">Venda</span>
                    <div id="vendaDisplay" class="text-xs sm:text-sm font-bold text-purple-400 display-field" onclick="if(editMode) selectField(this)">R$ 0</div>
                    <input type="text" id="vendaEdit" class="edit-field hidden text-xs sm:text-sm font-bold" value="" placeholder="95000">
                </div>
                <div class="valor-card">
                    <span class="text-xs text-gray-500">Lucro</span>
                    <div id="lucroDisplay" class="text-xs sm:text-sm font-bold">R$ 0</div>
                </div>
            </div>
            
            <!-- FIPE - Caixa de texto simples -->
            <div class="fipe-card">
                <div class="fipe-row">
                    <span><i class="fas fa-chart-line mr-1 text-purple-400"></i> Valor FIPE</span>
                    <div>
                        <span id="fipeDisplay" class="font-bold display-field text-xs sm:text-sm" onclick="if(editMode) selectField(this)">R$ 0</span>
                        <input type="text" id="fipeEdit" class="edit-field hidden text-xs sm:text-sm font-bold" value="" placeholder="50000" style="width:80px; text-align:right;">
                    </div>
                </div>
                <div class="fipe-row text-xs mt-1">
                    <span class="text-gray-500" id="fipeComparativo">Digite o valor da Tabela FIPE</span>
                </div>
            </div>
        </div>

        <!-- Observações (linha completa) -->
        <div class="bg-black/50 border border-gray-800 rounded-lg p-2 sm:p-3">
            <div class="flex items-start gap-2">
                <i class="fas fa-comment text-gray-600 mt-1"></i>
                <div class="flex-1">
                    <div id="obsDisplay" class="text-xs sm:text-sm text-gray-300 display-field" onclick="if(editMode) selectField(this)">-</div>
                    <input type="text" id="obsEdit" class="edit-field hidden w-full text-xs sm:text-sm" value="" placeholder="Observações...">
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript da página de detalhes -->
    <script src="detalhes-veiculo.js"></script>
</body>
</html>
