<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM Repasses | Detalhes do Veículo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #222;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .back-icon {
            width: 36px;
            height: 36px;
            border-radius: 36px;
            background: #111;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        
        .back-icon:hover {
            background: #1a1a1a;
            color: #fff;
            border-color: #666;
        }
        
        h1 {
            font-size: 24px;
            font-weight: 300;
            color: #fff;
        }
        
        .status-badge {
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            background: #111;
            border: 1px solid #333;
            color: #aaa;
        }
        
        .edit-field {
            background: #1a1a1a;
            border: 1px solid #a855f7;
            border-radius: 4px;
            padding: 4px 8px;
            color: #fff;
            font-size: 13px;
            width: 100%;
        }
        
        .edit-field:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 0 2px rgba(168,85,247,0.2);
        }
        
        .gallery {
            margin-bottom: 20px;
            position: relative;
        }
        
        .main-image-container {
            position: relative;
            width: 100%;
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        
        .main-image {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: contain;
            display: block;
            background: #111;
        }
        
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            border-radius: 40px;
            background: rgba(20,20,20,0.8);
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 18px;
            z-index: 10;
            backdrop-filter: blur(2px);
        }
        
        .nav-arrow:hover {
            background: rgba(40,40,40,0.9);
            border-color: #666;
        }
        
        .nav-arrow.left {
            left: 10px;
        }
        
        .nav-arrow.right {
            right: 10px;
        }
        
        .photo-counter {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            border: 1px solid #333;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 12px;
            color: #aaa;
            z-index: 10;
        }
        
        .thumbnail-strip {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 5px 0;
            scrollbar-width: thin;
            position: relative;
        }
        
        .thumbnail-container {
            position: relative;
            flex-shrink: 0;
        }
        
        .thumbnail {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            opacity: 0.6;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        
        .thumbnail:hover {
            opacity: 1;
            border-color: #666;
        }
        
        .thumbnail.active {
            opacity: 1;
            border-color: #a855f7;
        }
        
        .delete-photo-icon {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 20px;
            height: 20px;
            border-radius: 20px;
            background: #ef4444;
            border: 2px solid #111;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 10px;
            cursor: pointer;
            z-index: 20;
            transition: all 0.2s;
        }
        
        .delete-photo-icon:hover {
            background: #dc2626;
            transform: scale(1.1);
        }
        
        .add-photo-btn {
            width: 60px;
            height: 60px;
            flex-shrink: 0;
            background: #1a1a1a;
            border: 2px dashed #333;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 20px;
        }
        
        .add-photo-btn:hover {
            border-color: #a855f7;
            color: #a855f7;
            background: #222;
        }
        
        #fileInput {
            display: none;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .info-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 15px;
        }
        
        .info-card h2 {
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.5px;
            color: #888;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .info-card h2 i {
            color: #555;
            font-size: 13px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #222;
            font-size: 13px;
            align-items: center;
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            color: #666;
        }
        
        .info-value {
            color: #fff;
            font-weight: 400;
        }
        
        .action-icons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #222;
        }
        
        .action-icon {
            width: 36px;
            height: 36px;
            border-radius: 36px;
            background: #111;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        
        .action-icon:hover {
            background: #1a1a1a;
            color: #fff;
            border-color: #666;
        }
        
        .action-icon.edit-active {
            background: #a855f7;
            color: #fff;
            border-color: #a855f7;
        }
        
        .action-icon.delete {
            color: #f87171;
        }
        
        .action-icon.delete:hover {
            background: #ef4444;
            color: #fff;
            border-color: #ef4444;
        }
        
        .action-icon.save {
            color: #4ade80;
        }
        
        .action-icon.save:hover {
            background: #10b981;
            color: #fff;
            border-color: #10b981;
        }
        
        .action-icon.cancel {
            color: #fbbf24;
        }
        
        .action-icon.cancel:hover {
            background: #f59e0b;
            color: #fff;
            border-color: #f59e0b;
        }
        
        .error-container {
            text-align: center;
            padding: 40px 20px;
        }
        
        .error-icon {
            font-size: 40px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .error-title {
            font-size: 18px;
            color: #666;
            margin-bottom: 5px;
            font-weight: 300;
        }
        
        .error-text {
            color: #444;
            font-size: 13px;
        }
        
        .footer {
            text-align: center;
            color: #333;
            font-size: 10px;
            margin-top: 20px;
        }

        /* ESTILO DO BOTÃO DE TELA CHEIA */
        .fullscreen-btn {
            width: 36px;
            height: 36px;
            border-radius: 36px;
            background: #111;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
            margin-left: 10px;
        }
        
        .fullscreen-btn:hover {
            background: #a855f7;
            color: #fff;
            border-color: #a855f7;
            transform: scale(1.1);
        }

        /* INDICADOR DE TELA CHEIA */
        .fullscreen-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(168, 85, 247, 0.2);
            border: 1px solid #a855f7;
            color: #fff;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 11px;
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .fullscreen-indicator.visible {
            opacity: 1;
        }

        /* HEADER ACTIONS */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <!-- INDICADOR DE TELA CHEIA -->
    <div class="fullscreen-indicator" id="fullscreenIndicator">
        <i class="fas fa-expand mr-1"></i> Modo Tela Cheia - Pressione ESC para sair
    </div>

    <div class="container" id="veiculoContainer">
        <div class="error-container" id="loadingContainer">
            <div class="error-icon">
                <i class="fas fa-circle-notch fa-spin"></i>
            </div>
            <div class="error-title">Carregando...</div>
            <div class="error-text">Buscando informações do veículo</div>
        </div>
    </div>

    <input type="file" id="fileInput" multiple accept="image/*">

    <script>
        // Variáveis globais
        let fotoAtual = 0;
        let carAtual = null;
        let modoEdicao = false;
        let carsGlobal = [];

        // ========== FUNÇÃO DE TELA CHEIA ==========
        function ativarTelaCheia() {
            const elemento = document.documentElement;
            const indicator = document.getElementById('fullscreenIndicator');
            
            if (elemento.requestFullscreen) {
                elemento.requestFullscreen();
            } else if (elemento.webkitRequestFullscreen) {
                elemento.webkitRequestFullscreen();
            } else if (elemento.msRequestFullscreen) {
                elemento.msRequestFullscreen();
            }
            
            // Mostrar indicador
            if (indicator) {
                indicator.classList.add('visible');
            }
        }

        // Detectar quando sai do modo tela cheia (ESC)
        document.addEventListener('fullscreenchange', atualizarIndicadorFullscreen);
        document.addEventListener('webkitfullscreenchange', atualizarIndicadorFullscreen);
        document.addEventListener('mozfullscreenchange', atualizarIndicadorFullscreen);
        document.addEventListener('MSFullscreenChange', atualizarIndicadorFullscreen);

        function atualizarIndicadorFullscreen() {
            const indicator = document.getElementById('fullscreenIndicator');
            if (!document.fullscreenElement) {
                if (indicator) {
                    indicator.classList.remove('visible');
                }
            }
        }

        // ========== FUNÇÃO CORRIGIDA - Formatação segura ==========
        function formatarMoedaBrasileira(valor) {
            // Proteção contra null, undefined e NaN
            if (valor === null || valor === undefined) {
                return 'R$ 0,00';
            }
            
            // Converter para número se for string
            valor = Number(valor);
            
            // Verificar se é número válido
            if (isNaN(valor)) {
                return 'R$ 0,00';
            }
            
            if (valor === 0) return 'R$ 0,00';
            
            return valor.toLocaleString('pt-BR', { 
                style: 'currency', 
                currency: 'BRL' 
            });
        }

        // Converter string para número
        function converterParaNumero(valorFormatado) {
            if (!valorFormatado) return 0;
            let numero = valorFormatado.toString().replace(/\./g, '').replace(',', '.');
            return parseFloat(numero) || 0;
        }

        // Processar fotos
        async function processarFotos(files) {
            return new Promise((resolve) => {
                if (!files || files.length === 0) {
                    resolve([]);
                    return;
                }
                
                let fotos = [];
                let processadas = 0;
                
                for (let i = 0; i < Math.min(files.length, 10); i++) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        fotos.push(e.target.result);
                        processadas++;
                        if (processadas === Math.min(files.length, 10)) {
                            resolve(fotos);
                        }
                    };
                    reader.readAsDataURL(files[i]);
                }
            });
        }

        // Atualizar foto principal
        function atualizarFoto(index) {
            if (!carAtual || !carAtual.fotos || carAtual.fotos.length === 0) return;
            
            fotoAtual = index;
            const fotoPrincipal = document.getElementById('fotoPrincipal');
            if (fotoPrincipal) {
                fotoPrincipal.src = carAtual.fotos[fotoAtual];
            }
            
            const contador = document.getElementById('photoCounter');
            if (contador) {
                contador.innerHTML = `${fotoAtual + 1} / ${carAtual.fotos.length}`;
            }
            
            document.querySelectorAll('.thumbnail').forEach((thumb, i) => {
                if (i === fotoAtual) {
                    thumb.classList.add('active');
                } else {
                    thumb.classList.remove('active');
                }
            });
        }

        // Navegação
        function proximaFoto() {
            if (!carAtual || !carAtual.fotos || carAtual.fotos.length === 0) return;
            let novoIndex = (fotoAtual + 1) % carAtual.fotos.length;
            atualizarFoto(novoIndex);
        }

        function fotoAnterior() {
            if (!carAtual || !carAtual.fotos || carAtual.fotos.length === 0) return;
            let novoIndex = (fotoAtual - 1 + carAtual.fotos.length) % carAtual.fotos.length;
            atualizarFoto(novoIndex);
        }

        // Adicionar fotos
        function adicionarFotos() {
            document.getElementById('fileInput').click();
        }

        // Upload de fotos
        document.getElementById('fileInput').addEventListener('change', async function(e) {
            if (!carAtual) return;
            
            const novasFotos = await processarFotos(e.target.files);
            if (novasFotos.length === 0) return;
            
            // Adicionar novas fotos
            if (!carAtual.fotos) carAtual.fotos = [];
            carAtual.fotos = [...carAtual.fotos, ...novasFotos];
            
            // Salvar no localStorage
            const dadosSalvos = localStorage.getItem('gmRepasses');
            if (dadosSalvos) {
                const dados = JSON.parse(dadosSalvos);
                const index = dados.cars.findIndex(c => c.id == carAtual.id);
                if (index !== -1) {
                    dados.cars[index] = carAtual;
                    localStorage.setItem('gmRepasses', JSON.stringify(dados));
                }
            }
            
            // Recarregar
            carregarVeiculo();
        });

        // Excluir foto
        function excluirFoto(index) {
            if (!carAtual || !carAtual.fotos || carAtual.fotos.length <= 1) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Não é possível excluir',
                    text: 'O veículo deve ter pelo menos uma foto',
                    background: '#1a1a1a',
                    color: '#fff'
                });
                return;
            }
            
            Swal.fire({
                title: 'Excluir foto?',
                text: 'Esta ação não pode ser desfeita',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#6b7280',
                confirmButtonText: 'Sim, excluir',
                cancelButtonText: 'Cancelar',
                background: '#1a1a1a',
                color: '#fff'
            }).then((result) => {
                if (result.isConfirmed) {
                    // Remover foto
                    carAtual.fotos.splice(index, 1);
                    
                    // Ajustar índice
                    if (fotoAtual >= carAtual.fotos.length) {
                        fotoAtual = carAtual.fotos.length - 1;
                    }
                    
                    // Salvar
                    const dadosSalvos = localStorage.getItem('gmRepasses');
                    if (dadosSalvos) {
                        const dados = JSON.parse(dadosSalvos);
                        const idx = dados.cars.findIndex(c => c.id == carAtual.id);
                        if (idx !== -1) {
                            dados.cars[idx] = carAtual;
                            localStorage.setItem('gmRepasses', JSON.stringify(dados));
                        }
                    }
                    
                    carregarVeiculo();
                }
            });
        }

        // Entrar em modo edição
        function entrarModoEdicao() {
            modoEdicao = true;
            carregarVeiculo();
        }

        // Cancelar edição
        function cancelarEdicao() {
            modoEdicao = false;
            carregarVeiculo();
        }

        // Salvar edição
        function salvarEdicao() {
            // Coletar valores dos campos
            const marca = document.getElementById('editMarca')?.value;
            const modelo = document.getElementById('editModelo')?.value;
            const ano = document.getElementById('editAno')?.value;
            const placa = document.getElementById('editPlaca')?.value;
            const cor = document.getElementById('editCor')?.value;
            const km = document.getElementById('editKm')?.value;
            
            // Valores monetários
            const compraStr = document.getElementById('editCompra')?.value;
            const vendaStr = document.getElementById('editVenda')?.value;
            const status = document.getElementById('editStatus')?.value;
            
            // Validar campos obrigatórios
            if (!marca || !modelo) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Atenção',
                    text: 'Marca e modelo são obrigatórios',
                    background: '#1a1a1a',
                    color: '#fff'
                });
                return;
            }
            
            // Converter valores
            const compra = converterParaNumero(compraStr);
            const venda = converterParaNumero(vendaStr);
            
            if (compra <= 0 || venda <= 0) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Atenção',
                    text: 'Valores de compra e venda devem ser maiores que zero',
                    background: '#1a1a1a',
                    color: '#fff'
                });
                return;
            }
            
            // Atualizar objeto
            carAtual.marca = marca;
            carAtual.modelo = modelo;
            carAtual.ano = ano;
            carAtual.placa = placa;
            carAtual.cor = cor;
            carAtual.km = km;
            carAtual.compra = compra;
            carAtual.venda = venda;
            carAtual.status = status;
            carAtual.lucro = venda - compra;
            
            // Salvar no localStorage
            const dadosSalvos = localStorage.getItem('gmRepasses');
            if (dadosSalvos) {
                const dados = JSON.parse(dadosSalvos);
                const index = dados.cars.findIndex(c => c.id == carAtual.id);
                if (index !== -1) {
                    dados.cars[index] = carAtual;
                    localStorage.setItem('gmRepasses', JSON.stringify(dados));
                    
                    // Sair do modo edição
                    modoEdicao = false;
                    
                    // Recarregar
                    carregarVeiculo();
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'Sucesso!',
                        text: 'Veículo atualizado com sucesso',
                        background: '#1a1a1a',
                        color: '#fff',
                        timer: 1500,
                        showConfirmButton: false
                    });
                }
            }
        }

        // Excluir veículo
        function excluirVeiculo() {
            Swal.fire({
                title: 'Excluir veículo?',
                text: 'Esta ação não pode ser desfeita',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#6b7280',
                confirmButtonText: 'Sim, excluir',
                cancelButtonText: 'Cancelar',
                background: '#1a1a1a',
                color: '#fff'
            }).then((result) => {
                if (result.isConfirmed) {
                    const dadosSalvos = localStorage.getItem('gmRepasses');
                    if (dadosSalvos) {
                        const dados = JSON.parse(dadosSalvos);
                        dados.cars = dados.cars.filter(c => c.id != carAtual.id);
                        localStorage.setItem('gmRepasses', JSON.stringify(dados));
                    }
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'Excluído!',
                        text: 'Veículo removido com sucesso',
                        background: '#1a1a1a',
                        color: '#fff',
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        window.close();
                    });
                }
            });
        }

        // FUNÇÃO PRINCIPAL CORRIGIDA - Carregar veículo
        function carregarVeiculo() {
            const container = document.getElementById('veiculoContainer');
            const veiculoId = localStorage.getItem('veiculoId');
            
            if (!veiculoId) {
                container.innerHTML = `
                    <div class="error-container">
                        <div class="error-icon"><i class="fas fa-car"></i></div>
                        <div class="error-title">Nenhum veículo selecionado</div>
                        <div class="error-text">Volte e clique na foto de um veículo</div>
                    </div>
                `;
                return;
            }

            const dadosSalvos = localStorage.getItem('gmRepasses');
            if (!dadosSalvos) {
                container.innerHTML = `
                    <div class="error-container">
                        <div class="error-icon"><i class="fas fa-database"></i></div>
                        <div class="error-title">Erro ao carregar dados</div>
                        <div class="error-text">Nenhum dado encontrado</div>
                    </div>
                `;
                return;
            }

            const dados = JSON.parse(dadosSalvos);
            carsGlobal = dados.cars || [];
            carAtual = carsGlobal.find(c => c.id == veiculoId);

            if (!carAtual) {
                container.innerHTML = `
                    <div class="error-container">
                        <div class="error-icon"><i class="fas fa-exclamation-triangle"></i></div>
                        <div class="error-title">Veículo não encontrado</div>
                        <div class="error-text">O veículo pode ter sido excluído</div>
                    </div>
                `;
                return;
            }

            // Garantir que fotos existe
            if (!carAtual.fotos || carAtual.fotos.length === 0) {
                carAtual.fotos = ['https://via.placeholder.com/800x400/111/444?text=Sem+Foto'];
            }
            
            // Ajustar índice da foto
            if (fotoAtual >= carAtual.fotos.length) {
                fotoAtual = 0;
            }
            
            // Montar miniaturas
            let thumbnailsHtml = '';
            carAtual.fotos.forEach((foto, index) => {
                thumbnailsHtml += `
                    <div class="thumbnail-container">
                        <img src="${foto}" 
                             class="thumbnail ${index === fotoAtual ? 'active' : ''}" 
                             onclick="atualizarFoto(${index})"
                             onerror="this.src='https://via.placeholder.com/60x60/111/444?text=Erro'">
                        ${modoEdicao ? `
                            <div class="delete-photo-icon" onclick="excluirFoto(${index})">
                                <i class="fas fa-times"></i>
                            </div>
                        ` : ''}
                    </div>
                `;
            });

            // Botão adicionar foto em modo edição
            if (modoEdicao) {
                thumbnailsHtml += `
                    <div class="add-photo-btn" onclick="adicionarFotos()">
                        <i class="fas fa-plus"></i>
                    </div>
                `;
            }

            // CORREÇÃO: Calcular valores com segurança
            let compra = carAtual.compra !== undefined ? carAtual.compra : 0;
            let venda = carAtual.venda !== undefined ? carAtual.venda : 0;
            let lucro = venda - compra;
            if (isNaN(lucro)) lucro = 0;
            
            let margem = compra > 0 ? ((venda - compra) / compra * 100) : 0;
            if (isNaN(margem)) margem = 0;

            // Montar página com botão de tela cheia
            container.innerHTML = `
                <div class="header">
                    <div class="header-left">
                        <div class="back-icon" onclick="window.close()">
                            <i class="fas fa-arrow-left"></i>
                        </div>
                        ${modoEdicao ? 
                            `<input type="text" id="editMarca" class="edit-field" value="${carAtual.marca || ''}" placeholder="Marca" style="width: 200px;">` :
                            `<h1>${carAtual.marca || ''} ${carAtual.modelo || ''}</h1>`
                        }
                    </div>
                    <div class="header-actions">
                        ${modoEdicao ? 
                            `<select id="editStatus" class="edit-field" style="width: auto;">
                                <option value="Disponível" ${carAtual.status === 'Disponível' ? 'selected' : ''}>Disponível</option>
                                <option value="Vendido" ${carAtual.status === 'Vendido' ? 'selected' : ''}>Vendido</option>
                                <option value="Reservado" ${carAtual.status === 'Reservado' ? 'selected' : ''}>Reservado</option>
                            </select>` :
                            `<div class="status-badge">${carAtual.status || 'Disponível'}</div>`
                        }
                        <!-- BOTÃO DE TELA CHEIA -->
                        <div class="fullscreen-btn" onclick="ativarTelaCheia()" title="Tela Cheia">
                            <i class="fas fa-expand"></i>
                        </div>
                    </div>
                </div>

                <div class="gallery">
                    <div class="main-image-container">
                        <img src="${carAtual.fotos[fotoAtual]}" class="main-image" id="fotoPrincipal" onerror="this.src='https://via.placeholder.com/800x400/111/444?text=Erro'">
                        
                        ${carAtual.fotos.length > 1 ? `
                            <div class="nav-arrow left" onclick="fotoAnterior()">
                                <i class="fas fa-chevron-left"></i>
                            </div>
                            <div class="nav-arrow right" onclick="proximaFoto()">
                                <i class="fas fa-chevron-right"></i>
                            </div>
                            <div class="photo-counter" id="photoCounter">${fotoAtual + 1} / ${carAtual.fotos.length}</div>
                        ` : ''}
                    </div>

                    <div class="thumbnail-strip">
                        ${thumbnailsHtml}
                    </div>
                </div>

                <div class="info-grid">
                    <div class="info-card">
                        <h2><i class="fas fa-info-circle"></i> INFORMAÇÕES</h2>
                        <div class="info-row">
                            <span class="info-label">Modelo</span>
                            ${modoEdicao ? 
                                `<input type="text" id="editModelo" class="edit-field" value="${carAtual.modelo || ''}" placeholder="Modelo">` : 
                                `<span class="info-value">${carAtual.modelo || '-'}</span>`
                            }
                        </div>
                        <div class="info-row">
                            <span class="info-label">Ano</span>
                            ${modoEdicao ? 
                                `<input type="text" id="editAno" class="edit-field" value="${carAtual.ano || ''}" placeholder="Ano">` : 
                                `<span class="info-value">${carAtual.ano || '-'}</span>`
                            }
                        </div>
                        <div class="info-row">
                            <span class="info-label">Placa</span>
                            ${modoEdicao ? 
                                `<input type="text" id="editPlaca" class="edit-field" value="${carAtual.placa || ''}" placeholder="Placa">` : 
                                `<span class="info-value">${carAtual.placa || '-'}</span>`
                            }
                        </div>
                        <div class="info-row">
                            <span class="info-label">Cor</span>
                            ${modoEdicao ? 
                                `<input type="text" id="editCor" class="edit-field" value="${carAtual.cor || ''}" placeholder="Cor">` : 
                                `<span class="info-value">${carAtual.cor || '-'}</span>`
                            }
                        </div>
                        <div class="info-row">
                            <span class="info-label">KM</span>
                            ${modoEdicao ? 
                                `<input type="text" id="editKm" class="edit-field" value="${carAtual.km || ''}" placeholder="KM">` : 
                                `<span class="info-value">${carAtual.km ? carAtual.km + ' km' : '-'}</span>`
                            }
                        </div>
                    </div>

                    <div class="info-card">
                        <h2><i class="fas fa-chart-line"></i> FINANCEIRO</h2>
                        <div class="info-row">
                            <span class="info-label">Compra</span>
                            ${modoEdicao ? 
                                `<input type="text" id="editCompra" class="edit-field" value="${formatarMoedaBrasileira(compra).replace('R$ ', '')}" placeholder="0,00">` : 
                                `<span class="info-value">${formatarMoedaBrasileira(compra)}</span>`
                            }
                        </div>
                        <div class="info-row">
                            <span class="info-label">Venda</span>
                            ${modoEdicao ? 
                                `<input type="text" id="editVenda" class="edit-field" value="${formatarMoedaBrasileira(venda).replace('R$ ', '')}" placeholder="0,00">` : 
                                `<span class="info-value">${formatarMoedaBrasileira(venda)}</span>`
                            }
                        </div>
                        <div class="info-row">
                            <span class="info-label">Lucro</span>
                            <span class="info-value" style="color: ${lucro >= 0 ? '#4ade80' : '#f87171'}">
                                ${formatarMoedaBrasileira(lucro)}
                            </span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Margem</span>
                            <span class="info-value">${margem.toFixed(1).replace('.', ',')}%</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Data Compra</span>
                            <span class="info-value">${carAtual.dataCompra ? new Date(carAtual.dataCompra).toLocaleDateString('pt-BR') : '-'}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Data Venda</span>
                            <span class="info-value">${carAtual.dataVenda ? new Date(carAtual.dataVenda).toLocaleDateString('pt-BR') : '-'}</span>
                        </div>
                    </div>
                </div>

                <div class="action-icons">
                    ${modoEdicao ? `
                        <div class="action-icon save" onclick="salvarEdicao()" title="Salvar">
                            <i class="fas fa-check"></i>
                        </div>
                        <div class="action-icon cancel" onclick="cancelarEdicao()" title="Cancelar">
                            <i class="fas fa-times"></i>
                        </div>
                    ` : `
                        <div class="action-icon edit-active" onclick="entrarModoEdicao()" title="Editar">
                            <i class="fas fa-pen"></i>
                        </div>
                    `}
                    
                    <!-- ÍCONE DE EXCLUIR INDEPENDENTE -->
                    <div class="action-icon delete" onclick="excluirVeiculo()" title="Excluir">
                        <i class="fas fa-trash"></i>
                    </div>
                    
                    <div class="action-icon" onclick="window.print()" title="Imprimir">
                        <i class="fas fa-print"></i>
                    </div>
                    <div class="action-icon" onclick="navigator.clipboard.writeText('${carAtual.marca || ''} ${carAtual.modelo || ''} - ${formatarMoedaBrasileira(venda)}')" title="Copiar">
                        <i class="fas fa-copy"></i>
                    </div>
                    <div class="action-icon" onclick="window.close()" title="Fechar">
                        <i class="fas fa-times"></i>
                    </div>
                </div>

                <div class="footer">
                    GM REPASSES
                </div>
            `;
        }

        window.onload = carregarVeiculo;
    </script>
</body>
</html>
