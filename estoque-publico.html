<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>GM Repasses | Estoque de Veículos</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS da página de estoque público -->
    <link rel="stylesheet" href="estoque-publico.css">
</head>
<body class="dark-theme">
    <!-- INDICADOR DE TELA CHEIA -->
    <div class="fullscreen-indicator" id="fullscreenIndicator">
        <i class="fas fa-expand mr-1"></i> Modo Tela Cheia - Pressione ESC para sair
    </div>

    <!-- OVERLAY DO MENU MOBILE -->
    <div class="menu-overlay" id="menuOverlay" onclick="Menu.fechar()"></div>

    <!-- MENU MOBILE -->
    <div class="mobile-menu" id="mobileMenu">
        <div class="menu-header">
            <h3>MENU</h3>
            <div class="menu-close" onclick="Menu.fechar()">
                <i class="fas fa-times"></i>
            </div>
        </div>
        
        <!-- LINK DO INSTAGRAM -->
        <a href="https://www.instagram.com/gmrepasses_/" target="_blank" class="menu-item instagram">
            <i class="fab fa-instagram"></i>
            <span>Instagram</span>
            <i class="fas fa-external-link-alt text-xs opacity-50"></i>
        </a>
        
        <!-- LINK DO WHATSAPP -->
        <a href="https://chat.whatsapp.com/FYvCDjoFpHi6ZmZyIgbuRk" target="_blank" class="menu-item whatsapp">
            <i class="fab fa-whatsapp"></i>
            <span>WhatsApp</span>
            <i class="fas fa-external-link-alt text-xs opacity-50"></i>
        </a>
        
        <div class="menu-divider"></div>
        
        <div class="menu-item exit" onclick="Sair.executar()">
            <i class="fas fa-sign-out-alt"></i>
            <span>Sair</span>
        </div>
    </div>

    <!-- HEADER -->
    <div class="header-gradient py-3 md:py-4">
        <div class="container mx-auto px-3 md:px-4">
            <div class="flex items-center justify-between">
                <!-- Logo -->
                <img src="./image/log_3d.png" class="h-10 md:h-12" alt="Logo" onerror="this.src='https://via.placeholder.com/48x48/1a1a1a/666?text=GM'">
                
                <!-- Título (visível apenas em desktop) -->
                <div class="hidden md:block flex-1 text-center">
                    <h1 class="text-lg md:text-2xl font-bold text-white">A SUA LOJA É AQUI - <span class="purple-accent">VEJA NOSSAS OFERTAS!</span></h1>
                    <p class="text-xs text-gray-500">Veículos com procedência e garantia</p>
                </div>
                
                <!-- Ações do header -->
                <div class="header-actions">
                    <!-- Botão de tema -->
                    <div class="theme-toggle" onclick="Theme.toggle()" id="themeToggle" title="Alternar tema">
                        <i class="fas fa-sun"></i>
                    </div>
                    
                    <!-- Botão voltar (apenas desktop) -->
                    <div class="back-to-home" onclick="Navegacao.voltarPaginaPrincipal()" title="Página Principal">
                        <i class="fas fa-home"></i>
                    </div>
                    
                    <!-- ÍCONES SOCIAIS DESKTOP -->
                    <div class="social-icons">
                        <a href="https://www.instagram.com/gmrepasses_/" target="_blank" class="social-icon instagram" title="Instagram">
                            <i class="fab fa-instagram"></i>
                        </a>
                        <a href="https://chat.whatsapp.com/FYvCDjoFpHi6ZmZyIgbuRk" target="_blank" class="social-icon whatsapp" title="WhatsApp">
                            <i class="fab fa-whatsapp"></i>
                        </a>
                        <div class="social-icon exit" onclick="Sair.executar()" title="Sair">
                            <i class="fas fa-sign-out-alt"></i>
                        </div>
                    </div>
                    
                    <!-- Botão de tela cheia -->
                    <div class="fullscreen-btn" onclick="TelaCheia.ativar()" title="Tela Cheia">
                        <i class="fas fa-expand"></i>
                    </div>
                    
                    <!-- Botão hamburger (apenas mobile) -->
                    <div class="hamburger-btn" onclick="Menu.toggle()">
                        <i class="fas fa-bars"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="container mx-auto px-3 md:px-4 py-6 md:py-8">

        <!-- TÍTULO DA PÁGINA -->
        <div class="text-center mb-6 md:mb-8">
            <h2 class="text-2xl md:text-3xl lg:text-4xl font-bold text-white mb-2">Nosso <span class="purple-accent">Estoque</span></h2>
            <p class="text-sm md:text-base text-gray-500">Confira os veículos disponíveis para compra</p>
        </div>
        
        <!-- BUSCA -->
        <div class="max-w-2xl mx-auto mb-6 md:mb-8">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="buscaCliente" placeholder="Buscar por marca, modelo, ano ou cor..." onkeyup="Filtro.aplicar()">
            </div>
            <div class="text-right mt-2 text-xs md:text-sm text-gray-600" id="resultadoBusca"></div>
        </div>
        
        <!-- GRID DE VEÍCULOS -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6" id="veiculosGrid">
            <div class="loading">
                <i class="fas fa-circle-notch fa-spin"></i>
                <p class="mt-2 text-sm md:text-base">Carregando veículos...</p>
            </div>
        </div>
        
        <!-- BOTÃO WHATSAPP FLUTUANTE -->
        <a href="https://chat.whatsapp.com/FYvCDjoFpHi6ZmZyIgbuRk" target="_blank" class="whatsapp-float">
            <i class="fab fa-whatsapp"></i>
        </a>
        
    </div>

    <!-- JavaScript da página de estoque público -->
    <script src="estoque-publico.js"></script>
</body>
</html>
