<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />

    <title>GM Repasses | Login</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: black;
        min-height: 100vh;
        width: 100%;
        transition: background-color 0.4s ease;
      }

      /* Tema claro - fundo mais suave */
      body.light-theme {
        background: #f5f5f5;
      }

      .slideshow {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        overflow: hidden;
      }

      .slide {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        opacity: 0;
        transition: opacity 1.5s ease-in-out;
      }

      .slide.active {
        opacity: 1;
      }

      /* Overlay com gradiente - versão escura (original) */
      .banner-bg {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        height: auto;
        display: flex;
        align-items: center;
        overflow-y: auto;
        padding: 40px 0;
      }

      body.dark-theme .banner-bg {
        background: linear-gradient(
          90deg,
          rgba(0, 0, 0, 0.95) 0%,
          rgba(0, 0, 0, 0.85) 35%,
          rgba(0, 0, 0, 0.65) 60%,
          rgba(0, 0, 0, 0.4) 100%
        );
      }

      /* Overlay com gradiente - versão clara (sutil para não ofuscar as imagens) */
      body.light-theme .banner-bg {
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.85) 0%,
          rgba(255, 255, 255, 0.7) 35%,
          rgba(255, 255, 255, 0.5) 60%,
          rgba(255, 255, 255, 0.3) 100%
        );
      }

      /* Ajuste para mobile no tema claro */
      @media (max-width: 768px) {
        body.light-theme .banner-bg {
          background: linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.9) 0%,
            rgba(255, 255, 255, 0.8) 50%,
            rgba(255, 255, 255, 0.6) 100%
          );
        }
      }

      /* CARD DE LOGIN - TEMA ESCURO (original) */
      body.dark-theme .login-card {
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(8px);
        border-color: rgba(168, 85, 247, 0.5);
      }

      body.dark-theme .login-card h2 {
        color: white;
      }

      body.dark-theme .login-card input {
        background: black;
        border-color: #333;
        color: white;
      }

      body.dark-theme .login-card input::placeholder {
        color: #666;
      }

      /* CARD DE LOGIN - TEMA CLARO (branco translúcido) */
      body.light-theme .login-card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(12px);
        border-color: rgba(168, 85, 247, 0.6);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
      }

      body.light-theme .login-card h2 {
        color: #1e293b;
      }

      body.light-theme .login-card input {
        background: white;
        border-color: #e2e8f0;
        color: #1e293b;
      }

      body.light-theme .login-card input:focus {
        border-color: #a855f7 !important;
        box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
      }

      body.light-theme .login-card input::placeholder {
        color: #94a3b8;
      }

      body.light-theme .login-card .text-gray-500 {
        color: #64748b;
      }

      /* TEXTO DO LADO ESQUERDO - TEMA CLARO */
      body.light-theme .text-white:not(.purple-glow):not(.text-purple-500) {
        color: #0f172a;
      }

      body.light-theme .text-gray-300 {
        color: #334155;
      }

      body.light-theme .text-purple-400 {
        color: #a855f7;
      }

      body.light-theme .bg-gray-600 {
        background-color: #cbd5e1;
      }

      body.light-theme .indicator {
        background: rgba(0, 0, 0, 0.2);
      }

      body.light-theme .indicator.active {
        background: #a855f7;
        box-shadow: 0 0 15px #a855f7;
      }

      body.light-theme .indicator:hover {
        background: #a855f7;
      }

      body.light-theme .purple-glow {
        text-shadow: 0 0 15px rgba(168, 85, 247, 0.5);
      }

      /* Estilos originais mantidos */
      .purple-glow {
        text-shadow: 0 0 20px #a855f7, 0 0 40px rgba(168, 85, 247, 0.3);
        animation: glowPulse 2s infinite;
      }

      @keyframes glowPulse {
        0% { text-shadow: 0 0 20px #a855f7; }
        50% { text-shadow: 0 0 30px #a855f7, 0 0 50px rgba(168, 85, 247, 0.5); }
        100% { text-shadow: 0 0 20px #a855f7; }
      }

      .login-card {
        transition: all 0.3s;
        border: 1px solid rgba(168, 85, 247, 0.3);
        width: 100%;
        max-width: 450px;
        margin: 0 auto;
      }

      @media (min-width: 768px) {
        .login-card {
          margin: 0;
        }
      }

      .login-card:hover {
        border-color: #a855f7;
        box-shadow: 0 0 30px rgba(168, 85, 247, 0.2);
        transform: translateY(-2px);
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .text-left, .login-card {
        animation: fadeInUp 0.8s ease-out;
      }

      input:focus {
        border-color: #a855f7 !important;
        box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.2);
      }

      .banner-bg {
        min-height: 100vh;
        height: auto;
      }

      .indicators {
        display: flex;
        gap: 8px;
        margin-top: 20px;
      }

      .indicator {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        transition: all 0.3s ease;
        cursor: pointer;
      }

      .indicator.active {
        transform: scale(1.2);
      }

      .indicator:hover {
        transform: scale(1.1);
      }

      /* BOTÃO DE TEMA AGORA DENTRO DO CARD */
      .theme-toggle {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(168, 85, 247, 0.2);
        border: 2px solid #a855f7;
        color: #a855f7;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        transition: all 0.3s ease;
        backdrop-filter: blur(8px);
        box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        margin-left: auto;
      }

      .theme-toggle:hover {
        transform: scale(1.1);
        background: #a855f7;
        color: white;
        box-shadow: 0 0 25px #a855f7;
      }

      body.light-theme .theme-toggle {
        background: rgba(168, 85, 247, 0.15);
        color: #a855f7;
        border-color: #a855f7;
      }

      body.light-theme .theme-toggle:hover {
        background: #a855f7;
        color: white;
      }

      /* Ajustes de responsividade */
      @media (max-height: 500px) {
        .banner-bg { padding: 60px 0; align-items: flex-start; }
        .text-left img { width: 120px; margin-bottom: 12px; }
        .text-left h1 { font-size: 1.5rem; margin-bottom: 8px; }
        .text-left p { font-size: 0.9rem; margin-bottom: 12px; }
        .login-card { padding: 16px; }
      }

      @media (max-height: 350px) {
        .banner-bg { padding: 80px 0; }
        .text-left img { display: none; }
        .text-left h1 { font-size: 1.2rem; }
      }

      @media (max-width: 768px) {
        .banner-bg { padding: 30px 0; }
        .text-left h1 { font-size: 2rem; }
        .login-card { padding: 24px; margin-top: 20px; }
      }
    </style>
  </head>

  <body class="dark-theme">
    <div class="slideshow" id="slideshow"></div>

    <section class="banner-bg w-full min-h-screen flex items-center relative">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-10 w-full">
        <div class="grid md:grid-cols-2 items-center gap-6 md:gap-10">
          <!-- LADO ESQUERDO - TEXTO -->
          <div class="text-left order-2 md:order-1 mt-8 md:mt-0">
            <img src="./image/log_3d.png" class="w-32 xs:w-40 sm:w-48 md:w-64 mb-4 md:mb-6 mx-auto md:mx-0" alt="Logo GM Repasses" />

            <h1 class="text-2xl xs:text-3xl sm:text-4xl md:text-5xl font-bold text-white leading-tight mb-3 md:mb-6 text-center md:text-left">
              Os Melhores
              <span class="text-purple-500 purple-glow block sm:inline">
                Repasses de Veículos
              </span>
            </h1>

            <p class="text-gray-300 text-sm xs:text-base sm:text-lg mb-4 md:mb-8 max-w-lg text-center md:text-left mx-auto md:mx-0">
              Sistema exclusivo da
              <strong class="text-purple-400">GM Repasses</strong>
              para controle de estoque, cadastro de veículos, gestão financeira
              e acompanhamento de vendas.
            </p>

            <div class="flex justify-center md:justify-start gap-3 sm:gap-4">
              <button
                onclick="ativarTelaCheia()"
                class="bg-purple-600 hover:bg-purple-700 px-3 sm:px-4 md:px-6 py-2 sm:py-2 md:py-3 rounded-lg text-white font-semibold border border-purple-500 flex items-center gap-2 transition text-xs sm:text-sm md:text-base"
              >
                <i class="fas fa-expand"></i>
                <span class="hidden xs:inline">Módulo</span> Tela Cheia
              </button>
            </div>

            <!-- Indicadores do slideshow -->
            <div class="flex gap-3 mt-6 md:mt-10 justify-center md:justify-start" id="indicators">
              <!-- Os indicadores serão inseridos via JavaScript -->
            </div>
          </div>

          <!-- LADO DIREITO - CARD DE LOGIN -->
          <div
            class="login-card bg-black/80 backdrop-blur-md p-5 sm:p-6 md:p-8 lg:p-10 rounded-2xl border border-purple-600 shadow-2xl order-1 md:order-2"
          >
            <div class="flex items-center gap-2 mb-3 sm:mb-4 md:mb-6">
              <h2 class="text-lg sm:text-xl md:text-2xl text-white font-bold flex items-center gap-2">
                <i class="fas fa-lock text-purple-500 text-base sm:text-lg md:text-xl"></i>
                Acesso ao Sistema
              </h2>
              
              <!-- BOTÃO DE TEMA DENTRO DO CARD -->
              <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">
                <i class="fas fa-moon"></i>
              </button>
            </div>

            <div class="space-y-3 sm:space-y-4 md:space-y-5">
              <input
                id="username"
                type="text"
                placeholder="Usuário"
                autocomplete="username"
                class="w-full p-2 sm:p-2.5 md:p-3 bg-black border border-gray-700 rounded-lg text-white focus:outline-none focus:border-purple-500 transition text-sm sm:text-base"
              />

              <input
                id="password"
                type="password"
                placeholder="Senha"
                autocomplete="current-password"
                class="w-full p-2 sm:p-2.5 md:p-3 bg-black border border-gray-700 rounded-lg text-white focus:outline-none focus:border-purple-500 transition text-sm sm:text-base"
              />

              <button
                onclick="login()"
                class="w-full bg-purple-600 hover:bg-purple-700 transition p-2 sm:p-2.5 md:p-3 rounded-lg font-semibold flex items-center justify-center gap-2 group text-sm sm:text-base"
              >
                <span>Entrar no Sistema</span>
                <i
                  class="fas fa-arrow-right group-hover:translate-x-1 transition"
                ></i>
              </button>

              <p class="text-center text-gray-500 text-xs sm:text-sm mt-2 sm:mt-3 md:mt-4">
                <i class="fas fa-headset mr-1"></i> Suporte: (81) 991152307
              </p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script>
      // 4 imagens para o slideshow
      const imagens = [
        "./image/FUNDO 1.jpg", 
        "./image/FUNDO 2.jpg",
        "./image/FUNDO 3.avif",
        "./image/FUNDO 4.avif"
      ];

      let slideIndex = 0;
      let slideInterval;
      const slideshow = document.getElementById("slideshow");
      const indicatorsContainer = document.getElementById("indicators");

      // ========== FUNÇÃO DE TEMA ==========
      function toggleTheme() {
        const body = document.body;
        const themeToggle = document.getElementById('themeToggle');
        const icon = themeToggle.querySelector('i');
        
        if (body.classList.contains('dark-theme')) {
          body.classList.remove('dark-theme');
          body.classList.add('light-theme');
          icon.classList.remove('fa-moon');
          icon.classList.add('fa-sun');
          localStorage.setItem('theme', 'light');
        } else {
          body.classList.remove('light-theme');
          body.classList.add('dark-theme');
          icon.classList.remove('fa-sun');
          icon.classList.add('fa-moon');
          localStorage.setItem('theme', 'dark');
        }
        
        // Atualizar cores dos indicadores
        atualizarIndicadores(slideIndex);
      }

      function loadTheme() {
        const savedTheme = localStorage.getItem('theme');
        const themeToggle = document.getElementById('themeToggle');
        const icon = themeToggle.querySelector('i');
        
        if (savedTheme === 'light') {
          document.body.classList.remove('dark-theme');
          document.body.classList.add('light-theme');
          icon.classList.remove('fa-moon');
          icon.classList.add('fa-sun');
        } else {
          document.body.classList.add('dark-theme');
          document.body.classList.remove('light-theme');
          icon.classList.add('fa-moon');
          icon.classList.remove('fa-sun');
        }
      }

      function criarSlideshow() {
        slideshow.innerHTML = '';
        indicatorsContainer.innerHTML = '';

        imagens.forEach((img, index) => {
          const slide = document.createElement("div");
          slide.className = `slide ${index === 0 ? "active" : ""}`;
          slide.style.backgroundImage = `url('${img}')`;
          slideshow.appendChild(slide);

          const indicator = document.createElement("div");
          indicator.className = `indicator ${index === 0 ? "active" : ""}`;
          indicator.setAttribute("onclick", `irParaSlide(${index})`);
          indicatorsContainer.appendChild(indicator);
        });
      }

      function irParaSlide(index) {
        const slides = document.querySelectorAll(".slide");
        const indicators = document.querySelectorAll(".indicator");
        
        slides.forEach((slide) => slide.classList.remove("active"));
        slides[index].classList.add("active");
        
        indicators.forEach((indicator) => indicator.classList.remove("active"));
        indicators[index].classList.add("active");
        
        slideIndex = index;
      }

      function trocarSlide() {
        const slides = document.querySelectorAll(".slide");
        const indicators = document.querySelectorAll(".indicator");
        
        if (slides.length === 0) return;
        
        slides.forEach((slide) => slide.classList.remove("active"));
        indicators.forEach((indicator) => indicator.classList.remove("active"));
        
        slideIndex = (slideIndex + 1) % slides.length;
        
        slides[slideIndex].classList.add("active");
        indicators[slideIndex].classList.add("active");
      }

      function iniciarSlideshow() {
        criarSlideshow();
        
        if (slideInterval) {
          clearInterval(slideInterval);
        }
        
        slideInterval = setInterval(trocarSlide, 3000);
      }

      function atualizarIndicadores(index) {
        const indicators = document.querySelectorAll(".indicator");
        indicators.forEach((indicator, i) => {
          if (i === index) {
            indicator.classList.add("active");
          } else {
            indicator.classList.remove("active");
          }
        });
      }

      function limparCampos() {
        document.getElementById("username").value = "";
        document.getElementById("password").value = "";
      }

      function login() {
        let usuario = document.getElementById("username").value;
        let senha = document.getElementById("password").value;

        if (usuario === "" || senha === "") {
          Swal.fire({
            position: "top-end",
            icon: "warning",
            title: "Campos vazios",
            text: "Preencha usuário e senha",
            showConfirmButton: false,
            timer: 2000,
            toast: true,
            background: document.body.classList.contains('light-theme') ? '#ffffff' : '#1a1a1a',
            color: document.body.classList.contains('light-theme') ? '#1f2937' : '#fff'
          });
          return;
        }

        if (usuario === "ninho" && senha === "1234") {
          Swal.fire({
            position: "top-end",
            icon: "success",
            title: "Login realizado!",
            showConfirmButton: false,
            timer: 1500,
            toast: true,
            background: document.body.classList.contains('light-theme') ? '#ffffff' : '#1a1a1a',
            color: document.body.classList.contains('light-theme') ? '#1f2937' : '#fff'
          }).then(() => {
            limparCampos();
            window.location.href = "principal.html";
          });
        } else {
          Swal.fire({
            position: "top-end",
            icon: "error",
            title: "Erro no login",
            text: "Usuário ou senha incorretos",
            showConfirmButton: false,
            timer: 2000,
            toast: true,
            background: document.body.classList.contains('light-theme') ? '#ffffff' : '#1a1a1a',
            color: document.body.classList.contains('light-theme') ? '#1f2937' : '#fff'
          });
          limparCampos();
        }
      }

      function ativarTelaCheia() {
        const elemento = document.documentElement;
        if (elemento.requestFullscreen) {
          elemento.requestFullscreen();
        } else if (elemento.webkitRequestFullscreen) {
          elemento.webkitRequestFullscreen();
        } else if (elemento.msRequestFullscreen) {
          elemento.msRequestFullscreen();
        }
      }

      window.onload = function () {
        loadTheme();
        iniciarSlideshow();
      };
    </script>
  </body>
</html>
