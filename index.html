<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />

    <title>GM Repasses | Login</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- CSS da página de login -->
    <link rel="stylesheet" href="login.css" />
  </head>

  <body class="dark-theme">
    <div class="slideshow" id="slideshow"></div>

    <section class="banner-bg w-full min-h-screen flex items-center relative">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-10 w-full">
        <div class="grid md:grid-cols-2 items-center gap-6 md:gap-10">
          <!-- LADO ESQUERDO - TEXTO -->
          <div class="text-left order-2 md:order-1 mt-8 md:mt-0">
            <img src="./image/log_3d.png" class="w-32 xs:w-40 sm:w-48 md:w-64 mb-4 md:mb-6 mx-auto md:mx-0" alt="Logo GM Repasses" />

            <h1 class="text-2xl xs:text-3xl sm:text-4xl md:text-5xl font-bold text-white leading-tight mb-3 md:mb-6 text-center md:text-left">
              Os Melhores
              <span class="text-purple-500 purple-glow block sm:inline">
                Repasses de Veículos
              </span>
            </h1>

            <p class="text-gray-300 text-sm xs:text-base sm:text-lg mb-4 md:mb-8 max-w-lg text-center md:text-left mx-auto md:mx-0">
              Sistema exclusivo da
              <strong class="text-purple-400">GM Repasses</strong>
              para controle de estoque, cadastro de veículos, gestão financeira
              e acompanhamento de vendas.
            </p>

            <div class="flex justify-center md:justify-start gap-3 sm:gap-4">
              <button
                onclick="ativarTelaCheia()"
                class="bg-purple-600 hover:bg-purple-700 px-3 sm:px-4 md:px-6 py-2 sm:py-2 md:py-3 rounded-lg text-white font-semibold border border-purple-500 flex items-center gap-2 transition text-xs sm:text-sm md:text-base"
              >
                <i class="fas fa-expand"></i>
                <span class="hidden xs:inline">Módulo</span> Tela Cheia
              </button>
              
              <!-- BOTÃO ESTOQUE PÚBLICO - NOVO -->
              <button
                onclick="abrirEstoquePublico()"
                class="bg-green-600 hover:bg-green-700 px-3 sm:px-4 md:px-6 py-2 sm:py-2 md:py-3 rounded-lg text-white font-semibold border border-green-500 flex items-center gap-2 transition text-xs sm:text-sm md:text-base"
              >
                <i class="fas fa-warehouse"></i>
                <span class="hidden xs:inline">Ver</span> Veja a pagina de clientes! 
              </button>
            </div>

            <!-- Indicadores do slideshow -->
            <div class="flex gap-3 mt-6 md:mt-10 justify-center md:justify-start" id="indicators">
              <!-- Os indicadores serão inseridos via JavaScript -->
            </div>
          </div>

          <!-- LADO DIREITO - CARD DE LOGIN -->
          <div
            class="login-card bg-black/80 backdrop-blur-md p-5 sm:p-6 md:p-8 lg:p-10 rounded-2xl border border-purple-600 shadow-2xl order-1 md:order-2"
          >
            <div class="flex items-center gap-2 mb-3 sm:mb-4 md:mb-6">
              <h2 class="text-lg sm:text-xl md:text-2xl text-white font-bold flex items-center gap-2">
                <i class="fas fa-lock text-purple-500 text-base sm:text-lg md:text-xl"></i>
                Acesso de funcionario
              </h2>
              
              <!-- BOTÃO DE TEMA DENTRO DO CARD -->
              <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">
                <i class="fas fa-moon"></i>
              </button>
            </div>

            <div class="space-y-3 sm:space-y-4 md:space-y-5">
              <input
                id="username"
                type="text"
                placeholder="Usuário"
                autocomplete="username"
                class="w-full p-2 sm:p-2.5 md:p-3 bg-black border border-gray-700 rounded-lg text-white focus:outline-none focus:border-purple-500 transition text-sm sm:text-base"
              />

              <input
                id="password"
                type="password"
                placeholder="Senha"
                autocomplete="current-password"
                class="w-full p-2 sm:p-2.5 md:p-3 bg-black border border-gray-700 rounded-lg text-white focus:outline-none focus:border-purple-500 transition text-sm sm:text-base"
              />

              <button
                onclick="login()"
                class="w-full bg-purple-600 hover:bg-purple-700 transition p-2 sm:p-2.5 md:p-3 rounded-lg font-semibold flex items-center justify-center gap-2 group text-sm sm:text-base"
              >
                <span>Entrar no Sistema</span>
                <i
                  class="fas fa-arrow-right group-hover:translate-x-1 transition"
                ></i>
              </button>

              <p class="text-center text-gray-500 text-xs sm:text-sm mt-2 sm:mt-3 md:mt-4">
                <i class="fas fa-headset mr-1"></i> Suporte: (81) 991152307
              </p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- JavaScript da página de login -->
    <script src="login.js"></script>
  </body>
</html>
