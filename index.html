<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />

    <title>GM Repasses | Login</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        /* REMOVIDO overflow: hidden para permitir rolagem */
        background: black;
        min-height: 100vh;
        width: 100%;
      }

      .slideshow {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        overflow: hidden;
      }

      .slide {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        opacity: 0;
        transition: opacity 1.5s ease-in-out;
      }

      .slide.active {
        opacity: 1;
      }

      .banner-bg {
        position: relative;
        z-index: 1;
        background: linear-gradient(
          90deg,
          rgba(0, 0, 0, 0.95) 0%,
          rgba(0, 0, 0, 0.85) 35%,
          rgba(0, 0, 0, 0.65) 60%,
          rgba(0, 0, 0, 0.4) 100%
        );
        min-height: 100vh;
        height: auto;
        display: flex;
        align-items: center;
        overflow-y: auto;
        padding: 40px 0;
      }

      /* Ajustes para telas muito pequenas (altura < 400px) */
      @media (max-height: 500px) {
        .banner-bg {
          padding: 60px 0;
          align-items: flex-start;
        }
        
        .banner-bg .max-w-7xl {
          padding-top: 20px;
          padding-bottom: 20px;
        }
        
        .text-left img {
          width: 120px;
          margin-bottom: 12px;
        }
        
        .text-left h1 {
          font-size: 1.5rem;
          margin-bottom: 8px;
        }
        
        .text-left p {
          font-size: 0.9rem;
          margin-bottom: 12px;
        }
        
        .login-card {
          padding: 16px;
        }
        
        .login-card h2 {
          font-size: 1.1rem;
          margin-bottom: 12px;
        }
        
        .login-card .space-y-4 {
          gap: 8px;
        }
        
        .login-card input,
        .login-card button {
          padding: 8px;
          font-size: 0.9rem;
        }
      }

      /* Ajustes para telas muito pequenas (altura < 300px) */
      @media (max-height: 350px) {
        .banner-bg {
          padding: 80px 0;
        }
        
        .text-left img {
          display: none;
        }
        
        .text-left h1 {
          font-size: 1.2rem;
        }
        
        .text-left p {
          font-size: 0.8rem;
          margin-bottom: 8px;
        }
        
        .text-left .flex {
          margin-top: 8px;
        }
        
        .login-card {
          padding: 12px;
        }
        
        .login-card .space-y-4 > * {
          margin-bottom: 6px;
        }
      }

      /* Ajustes para mobile (largura < 768px) */
      @media (max-width: 768px) {
        .banner-bg {
          background: linear-gradient(
            180deg,
            rgba(0, 0, 0, 0.95) 0%,
            rgba(0, 0, 0, 0.85) 50%,
            rgba(0, 0, 0, 0.7) 100%
          );
          padding: 30px 0;
        }
        
        .banner-bg .max-w-7xl {
          padding-left: 16px;
          padding-right: 16px;
        }
        
        .text-left h1 {
          font-size: 2rem;
          line-height: 1.2;
        }
        
        .text-left p {
          font-size: 1rem;
        }
        
        .login-card {
          padding: 24px;
          margin-top: 20px;
        }
      }

      /* Ajustes para tablets */
      @media (min-width: 769px) and (max-width: 1024px) {
        .banner-bg .max-w-7xl {
          padding-left: 24px;
          padding-right: 24px;
        }
        
        .text-left h1 {
          font-size: 2.5rem;
        }
      }

      .purple-glow {
        text-shadow:
          0 0 20px #a855f7,
          0 0 40px rgba(168, 85, 247, 0.3);
        animation: glowPulse 2s infinite;
      }

      @keyframes glowPulse {
        0% {
          text-shadow: 0 0 20px #a855f7;
        }
        50% {
          text-shadow:
            0 0 30px #a855f7,
            0 0 50px rgba(168, 85, 247, 0.5);
        }
        100% {
          text-shadow: 0 0 20px #a855f7;
        }
      }

      .login-card {
        transition: all 0.3s;
        border: 1px solid rgba(168, 85, 247, 0.3);
        width: 100%;
        max-width: 450px;
        margin: 0 auto;
      }

      @media (min-width: 768px) {
        .login-card {
          margin: 0;
        }
      }

      .login-card:hover {
        border-color: #a855f7;
        box-shadow: 0 0 30px rgba(168, 85, 247, 0.2);
        transform: translateY(-2px);
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .text-left,
      .login-card {
        animation: fadeInUp 0.8s ease-out;
      }

      input:focus {
        border-color: #a855f7 !important;
        box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.2);
      }

      /* Garantir que o conteúdo seja sempre visível */
      .banner-bg {
        min-height: 100vh;
        height: auto;
      }

      /* Estilo para os indicadores */
      .indicators {
        display: flex;
        gap: 8px;
        margin-top: 20px;
      }

      .indicator {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        transition: all 0.3s ease;
        cursor: pointer;
      }

      .indicator.active {
        background: #a855f7;
        transform: scale(1.2);
        box-shadow: 0 0 15px #a855f7;
      }

      .indicator:hover {
        background: #a855f7;
        transform: scale(1.1);
      }
    </style>
  </head>

  <body>
    <div class="slideshow" id="slideshow"></div>

    <section class="banner-bg w-full min-h-screen flex items-center relative">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-10 w-full">
        <div class="grid md:grid-cols-2 items-center gap-6 md:gap-10">
          <!-- LADO ESQUERDO - TEXTO -->
          <div class="text-left order-2 md:order-1 mt-8 md:mt-0">
            <img src="./image/log_3d.png" class="w-32 xs:w-40 sm:w-48 md:w-64 mb-4 md:mb-6 mx-auto md:mx-0" alt="Logo GM Repasses" />

            <h1 class="text-2xl xs:text-3xl sm:text-4xl md:text-5xl font-bold text-white leading-tight mb-3 md:mb-6 text-center md:text-left">
              Os Melhores
              <span class="text-purple-500 purple-glow block sm:inline">
                Repasses de Veículos
              </span>
            </h1>

            <p class="text-gray-300 text-sm xs:text-base sm:text-lg mb-4 md:mb-8 max-w-lg text-center md:text-left mx-auto md:mx-0">
              Sistema exclusivo da
              <strong class="text-purple-400">GM Repasses</strong>
              para controle de estoque, cadastro de veículos, gestão financeira
              e acompanhamento de vendas.
            </p>

            <div class="flex justify-center md:justify-start gap-3 sm:gap-4">
              <button
                onclick="ativarTelaCheia()"
                class="bg-purple-600 hover:bg-purple-700 px-3 sm:px-4 md:px-6 py-2 sm:py-2 md:py-3 rounded-lg text-white font-semibold border border-purple-500 flex items-center gap-2 transition text-xs sm:text-sm md:text-base"
              >
                <i class="fas fa-expand"></i>
                <span class="hidden xs:inline">Módulo</span> Tela Cheia
              </button>
            </div>

            <!-- Indicadores do slideshow -->
            <div class="flex gap-3 mt-6 md:mt-10 justify-center md:justify-start" id="indicators">
              <!-- Os indicadores serão inseridos via JavaScript -->
            </div>
          </div>

          <!-- LADO DIREITO - CARD DE LOGIN -->
          <div
            class="login-card bg-black/80 backdrop-blur-md p-5 sm:p-6 md:p-8 lg:p-10 rounded-2xl border border-purple-600 shadow-2xl order-1 md:order-2"
          >
            <h2
              class="text-lg sm:text-xl md:text-2xl text-white font-bold mb-3 sm:mb-4 md:mb-6 flex items-center gap-2"
            >
              <i class="fas fa-lock text-purple-500 text-base sm:text-lg md:text-xl"></i>
              Acesso ao Sistema
            </h2>

            <div class="space-y-3 sm:space-y-4 md:space-y-5">
              <input
                id="username"
                type="text"
                placeholder="Usuário"
                autocomplete="username"
                class="w-full p-2 sm:p-2.5 md:p-3 bg-black border border-gray-700 rounded-lg text-white focus:outline-none focus:border-purple-500 transition text-sm sm:text-base"
              />

              <input
                id="password"
                type="password"
                placeholder="Senha"
                autocomplete="current-password"
                class="w-full p-2 sm:p-2.5 md:p-3 bg-black border border-gray-700 rounded-lg text-white focus:outline-none focus:border-purple-500 transition text-sm sm:text-base"
              />

              <button
                onclick="login()"
                class="w-full bg-purple-600 hover:bg-purple-700 transition p-2 sm:p-2.5 md:p-3 rounded-lg font-semibold flex items-center justify-center gap-2 group text-sm sm:text-base"
              >
                <span>Entrar no Sistema</span>
                <i
                  class="fas fa-arrow-right group-hover:translate-x-1 transition"
                ></i>
              </button>

              <p class="text-center text-gray-500 text-xs sm:text-sm mt-2 sm:mt-3 md:mt-4">
                <i class="fas fa-headset mr-1"></i> Suporte: (81) 991152307
              </p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script>
      // 4 imagens para o slideshow
      const imagens = [
        "./image/FUNDO 1.jpg", 
        "./image/FUNDO 2.jpg",
        "./image/FUNDO 3.avif",
        "./image/FUNDO 4.avif"
      ];

      let slideIndex = 0;
      let slideInterval;
      const slideshow = document.getElementById("slideshow");
      const indicatorsContainer = document.getElementById("indicators");

      function criarSlideshow() {
        // Limpar slides e indicadores existentes
        slideshow.innerHTML = '';
        indicatorsContainer.innerHTML = '';

        // Criar slides e indicadores
        imagens.forEach((img, index) => {
          // Criar slide
          const slide = document.createElement("div");
          slide.className = `slide ${index === 0 ? "active" : ""}`;
          slide.style.backgroundImage = `url('${img}')`;
          slideshow.appendChild(slide);

          // Criar indicador
          const indicator = document.createElement("div");
          indicator.className = `indicator ${index === 0 ? "active" : ""}`;
          indicator.setAttribute("onclick", `irParaSlide(${index})`);
          indicatorsContainer.appendChild(indicator);
        });
      }

      function irParaSlide(index) {
        const slides = document.querySelectorAll(".slide");
        const indicators = document.querySelectorAll(".indicator");
        
        // Atualizar slides
        slides.forEach((slide) => slide.classList.remove("active"));
        slides[index].classList.add("active");
        
        // Atualizar indicadores
        indicators.forEach((indicator) => indicator.classList.remove("active"));
        indicators[index].classList.add("active");
        
        // Atualizar índice atual
        slideIndex = index;
      }

      function trocarSlide() {
        const slides = document.querySelectorAll(".slide");
        const indicators = document.querySelectorAll(".indicator");
        
        if (slides.length === 0) return;
        
        // Remover classe active de todos
        slides.forEach((slide) => slide.classList.remove("active"));
        indicators.forEach((indicator) => indicator.classList.remove("active"));
        
        // Avançar para o próximo slide
        slideIndex = (slideIndex + 1) % slides.length;
        
        // Adicionar classe active ao slide e indicador atual
        slides[slideIndex].classList.add("active");
        indicators[slideIndex].classList.add("active");
      }

      function iniciarSlideshow() {
        criarSlideshow();
        
        // Limpar intervalo anterior se existir
        if (slideInterval) {
          clearInterval(slideInterval);
        }
        
        // Iniciar novo intervalo (3 segundos)
        slideInterval = setInterval(trocarSlide, 3000);
      }

      function limparCampos() {
        document.getElementById("username").value = "";
        document.getElementById("password").value = "";
      }

      function login() {
        let usuario = document.getElementById("username").value;
        let senha = document.getElementById("password").value;

        if (usuario === "" || senha === "") {
          Swal.fire({
            position: "top-end",
            icon: "warning",
            title: "Campos vazios",
            text: "Preencha usuário e senha",
            showConfirmButton: false,
            timer: 2000,
            toast: true,
          });
          return;
        }

        if (usuario === "ninho" && senha === "1234") {
          Swal.fire({
            position: "top-end",
            icon: "success",
            title: "Login realizado!",
            showConfirmButton: false,
            timer: 1500,
            toast: true,
          }).then(() => {
            limparCampos();
            window.location.href = "principal.html";
          });
        } else {
          Swal.fire({
            position: "top-end",
            icon: "error",
            title: "Erro no login",
            text: "Usuário ou senha incorretos",
            showConfirmButton: false,
            timer: 2000,
            toast: true,
          });
          limparCampos();
        }
      }

      function ativarTelaCheia() {
        const elemento = document.documentElement;
        if (elemento.requestFullscreen) {
          elemento.requestFullscreen();
        } else if (elemento.webkitRequestFullscreen) {
          elemento.webkitRequestFullscreen();
        } else if (elemento.msRequestFullscreen) {
          elemento.msRequestFullscreen();
        }
      }

      window.onload = function () {
        iniciarSlideshow();
      };
    </script>
  </body>
</html>
