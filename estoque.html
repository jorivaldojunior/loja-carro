<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>GM Repasses | Estoque</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS da página de estoque -->
    <link rel="stylesheet" href="estoque.css">
</head>
<body class="dark-theme text-gray-200 min-h-screen">
    <!-- INDICADOR DE TELA CHEIA -->
    <div class="fullscreen-indicator" id="fullscreenIndicator">
        <i class="fas fa-expand mr-1"></i> Modo Tela Cheia - Pressione ESC para sair
    </div>

    <!-- HEADER -->
    <header class="header-gradient sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-6 py-3 lg:py-4">
            <div class="flex items-center justify-between flex-wrap lg:flex-nowrap gap-3">
                <div class="flex items-center gap-3 lg:gap-6 w-full lg:w-auto">
                    <button onclick="voltarDashboard()" class="back-btn">
                        <i class="fas fa-arrow-left"></i>
                        <span class="hidden md:inline">Dashboard</span>
                    </button>

                    <div class="flex-1 lg:flex-none">
                        <h1 class="text-xl sm:text-2xl lg:text-3xl font-bold purple-accent flex items-center gap-2 lg:gap-3">
                            <i class="fas fa-car"></i>
                            <span class="hidden xs:inline">Estoque de Veículos</span>
                            <span class="xs:hidden">Estoque</span>
                        </h1>
                        <p class="text-xs text-gray-500 mt-1 hidden sm:block">
                            Gerencie todos os veículos da loja
                        </p>
                    </div>
                </div>

                <div class="flex items-center gap-2 lg:gap-3 ml-auto">
                    <!-- BOTÃO DE TEMA -->
                    <button onclick="toggleTheme()" class="theme-toggle" id="themeToggle" title="Alternar tema">
                        <i class="fas fa-sun"></i>
                        <span class="hidden md:inline">Tema</span>
                    </button>

                    <!-- BOTÃO DE TELA CHEIA -->
                    <button onclick="ativarTelaCheia()" class="fullscreen-btn" title="Tela Cheia">
                        <i class="fas fa-expand"></i>
                        <span class="hidden md:inline">Tela Cheia</span>
                    </button>

                    <button onclick="recarregarDados()" class="back-btn" title="Atualizar dados">
                        <i class="fas fa-sync-alt"></i>
                    </button>

                    <button onclick="abrirCadastro()" class="btn-primary">
                        <i class="fas fa-plus-circle"></i>
                        <span class="hidden md:inline">Novo Veículo</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-6 py-6 lg:py-8">
        <!-- FILTROS E BUSCA -->
        <div class="mb-6 lg:mb-8 space-y-4">
            <!-- Barra de busca inteligente -->
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="filtroInteligente" placeholder="Buscar por marca, modelo, ano, cor, placa ou status..." onkeyup="aplicarFiltros()" autocomplete="off" />
            </div>

            <!-- Filtros rápidos -->
            <div class="flex flex-wrap gap-2 lg:gap-3">
                <span class="filter-chip active" onclick="filtrarPorStatus('todos')" id="filtroTodos">
                    <i class="fas fa-list"></i> Todos
                </span>
                <span class="filter-chip" onclick="filtrarPorStatus('disponivel')" id="filtroDisponivel">
                    <i class="fas fa-check-circle"></i> Disponível
                </span>
                <span class="filter-chip" onclick="filtrarPorStatus('reservado')" id="filtroReservado">
                    <i class="fas fa-clock"></i> Reservado
                </span>
                <span class="filter-chip" onclick="filtrarPorStatus('vendido')" id="filtroVendido">
                    <i class="fas fa-check-double"></i> Vendido
                </span>

                <span class="filter-chip" onclick="ordenarPor('recentes')" id="ordemRecentes">
                    <i class="fas fa-calendar-alt"></i> Recentes
                </span>
                <span class="filter-chip" onclick="ordenarPor('menorPreco')" id="ordemMenorPreco">
                    <i class="fas fa-arrow-down"></i> Menor Preço
                </span>
                <span class="filter-chip" onclick="ordenarPor('maiorPreco')" id="ordemMaiorPreco">
                    <i class="fas fa-arrow-up"></i> Maior Preço
                </span>

                <span class="filter-chip" onclick="exportarDados()">
                    <i class="fas fa-download"></i> Exportar
                </span>
            </div>

            <!-- Stats da busca -->
            <div class="search-stats" id="filtroStats">Carregando veículos...</div>
        </div>

        <!-- ÁREA DE CARREGAMENTO / CARDS -->
        <div id="estoqueContainer">
            <!-- Loading skeleton (aparece enquanto carrega) -->
            <div id="loadingSkeleton" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 lg:gap-6">
                <div class="card p-4">
                    <div class="skeleton h-36 sm:h-40 w-full mb-4"></div>
                    <div class="skeleton h-4 w-3/4 mb-2"></div>
                    <div class="skeleton h-4 w-1/2"></div>
                </div>
                <div class="card p-4">
                    <div class="skeleton h-36 sm:h-40 w-full mb-4"></div>
                    <div class="skeleton h-4 w-3/4 mb-2"></div>
                    <div class="skeleton h-4 w-1/2"></div>
                </div>
                <div class="card p-4">
                    <div class="skeleton h-36 sm:h-40 w-full mb-4"></div>
                    <div class="skeleton h-4 w-3/4 mb-2"></div>
                    <div class="skeleton h-4 w-1/2"></div>
                </div>
            </div>

            <!-- Cards serão inseridos aqui via JavaScript -->
            <div id="estoqueCards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 lg:gap-6 hidden"></div>
        </div>

        <!-- PAGINAÇÃO -->
        <div id="paginacao" class="pagination hidden">
            <div class="page-btn disabled" id="prevPage" onclick="mudarPagina('prev')">
                <i class="fas fa-chevron-left"></i>
            </div>
            <div id="pageNumbers" class="flex gap-1 lg:gap-2"></div>
            <div class="page-btn" id="nextPage" onclick="mudarPagina('next')">
                <i class="fas fa-chevron-right"></i>
            </div>
        </div>
    </main>

    <!-- MODAL DE EXPORTAÇÃO -->
    <div id="modalExportar" class="fixed inset-0 bg-black bg-opacity-80 hidden items-center justify-center z-50 p-4">
        <div class="bg-gray-900 p-6 lg:p-8 rounded-xl w-full max-w-md border border-gray-700">
            <h2 class="text-lg lg:text-xl font-bold mb-4 purple-accent flex items-center gap-3">
                <i class="fas fa-download"></i>
                Exportar Dados
            </h2>
            <p class="text-sm text-gray-400 mb-6">
                Escolha o formato para exportar o estoque:
            </p>

            <button onclick="exportarCSV()" class="w-full bg-gray-800 hover:bg-gray-700 p-3 lg:p-4 rounded-lg mb-3 text-left flex items-center gap-3 transition-all text-sm lg:text-base">
                <i class="fas fa-file-csv text-green-400"></i>
                <div>
                    <div class="font-bold">CSV (Excel)</div>
                    <div class="text-xs text-gray-400">Abrir no Excel, Google Sheets</div>
                </div>
            </button>

            <button onclick="exportarJSON()" class="w-full bg-gray-800 hover:bg-gray-700 p-3 lg:p-4 rounded-lg mb-3 text-left flex items-center gap-3 transition-all text-sm lg:text-base">
                <i class="fas fa-file-code text-yellow-400"></i>
                <div>
                    <div class="font-bold">JSON</div>
                    <div class="text-xs text-gray-400">Formato para desenvolvedores</div>
                </div>
            </button>

            <button onclick="exportarPDF()" class="w-full bg-gray-800 hover:bg-gray-700 p-3 lg:p-4 rounded-lg mb-6 text-left flex items-center gap-3 transition-all text-sm lg:text-base">
                <i class="fas fa-file-pdf text-red-400"></i>
                <div>
                    <div class="font-bold">PDF</div>
                    <div class="text-xs text-gray-400">Relatório formatado</div>
                </div>
            </button>

            <button onclick="fecharModalExportar()" class="w-full p-3 bg-gray-700 rounded-lg hover:bg-gray-600 transition-all text-sm lg:text-base">
                Cancelar
            </button>
        </div>
    </div>

    <!-- JavaScript da página de estoque -->
    <script src="estoque.js"></script>
</body>
</html>
