<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>GM Repasses | Cadastrar Veículo</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS da página de cadastro -->
    <link rel="stylesheet" href="cadastro-veiculo.css">
</head>
<body class="dark-theme">
    <!-- INDICADOR DE TELA CHEIA -->
    <div class="fullscreen-indicator" id="fullscreenIndicator">
        <i class="fas fa-expand mr-1"></i> Modo Tela Cheia - Pressione ESC para sair
    </div>

    <div class="container">
        <!-- HEADER COM BOTÃO DE TELA CHEIA -->
        <div class="header">
            <div class="header-left">
                <div class="back-icon" onclick="voltar()" title="Voltar">
                    <i class="fas fa-arrow-left"></i>
                </div>
                <h1><span class="purple-accent">+</span> NOVO VEÍCULO</h1>
                <div class="shortcut-hint">
                    <i class="fas fa-keyboard"></i> Ctrl+Enter salvar
                </div>
            </div>
            <div class="header-actions">
                <!-- BOTÃO DE TEMA -->
                <div class="theme-toggle" onclick="toggleTheme()" id="themeToggle" title="Alternar tema">
                    <i class="fas fa-sun"></i>
                </div>
                <div class="fullscreen-header-btn" onclick="ativarTelaCheia()" title="Tela Cheia">
                    <i class="fas fa-expand"></i>
                </div>
                <img src="./image/log_3d.png" style="height: 32px; opacity: 0.7;" onerror="this.style.display='none'">
            </div>
        </div>

        <!-- FORMULÁRIO -->
        <div class="card">
            <!-- LINHA 1: MARCA | MODELO -->
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-tag"></i> MARCA</label>
                    <input type="text" id="marca" class="form-control" placeholder="Ex: Toyota" autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-car"></i> MODELO</label>
                    <input type="text" id="modelo" class="form-control" placeholder="Ex: Corolla" autocomplete="off">
                </div>
            </div>

            <!-- LINHA 2: ANO | PLACA -->
            <div class="form-grid" style="margin-top: 8px;">
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-calendar"></i> ANO</label>
                    <input type="text" id="ano" class="form-control" placeholder="2022" autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-id-card"></i> PLACA</label>
                    <input type="text" id="placa" class="form-control" placeholder="ABC1D23" style="text-transform: uppercase;">
                </div>
            </div>

            <!-- LINHA 3: COR | KM | COMBUSTÍVEL -->
            <div class="form-grid-3" style="margin-top: 8px;">
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-palette"></i> COR</label>
                    <input type="text" id="cor" class="form-control" placeholder="Preto" autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-tachometer-alt"></i> KM</label>
                    <input type="text" id="km" class="form-control" placeholder="25000" autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-gas-pump"></i> COMBUSTÍVEL</label>
                    <select id="combustivel" class="form-control">
                        <option value="">Selecione</option>
                        <option value="Gasolina">Gasolina</option>
                        <option value="Etanol">Etanol</option>
                        <option value="Flex" selected>Flex</option>
                        <option value="Diesel">Diesel</option>
                        <option value="Elétrico">Elétrico</option>
                        <option value="Híbrido">Híbrido</option>
                    </select>
                </div>
            </div>

            <!-- LINHA 4: COMPRA | VENDA | FIPE -->
            <div class="form-grid-3" style="margin-top: 8px;">
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-arrow-down"></i> COMPRA (R$)</label>
                    <div class="input-group">
                        <span class="input-group-text">R$</span>
                        <input type="text" id="compra" class="form-control" placeholder="85.000,00" onkeyup="formatarMoeda(this)">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-arrow-up"></i> VENDA (R$)</label>
                    <div class="input-group">
                        <span class="input-group-text">R$</span>
                        <input type="text" id="venda" class="form-control" placeholder="95.000,00" onkeyup="formatarMoeda(this)">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-chart-line"></i> FIPE (R$)</label>
                    <div class="input-group">
                        <span class="input-group-text">R$</span>
                        <input type="text" id="fipe" class="form-control" placeholder="90.000,00" onkeyup="formatarMoeda(this)">
                    </div>
                </div>
            </div>

            <!-- LINHA 5: DATA COMPRA | DATA VENDA -->
            <div class="form-grid" style="margin-top: 8px;">
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-calendar-plus"></i> DATA COMPRA</label>
                    <input type="date" id="dataCompra" class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-calendar-check"></i> DATA VENDA</label>
                    <input type="date" id="dataVenda" class="form-control">
                </div>
            </div>

            <!-- LINHA 6: STATUS | OBSERVAÇÕES -->
            <div class="form-grid" style="margin-top: 8px;">
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-info-circle"></i> STATUS</label>
                    <select id="status" class="form-control">
                        <option value="Disponível" selected>📌 Disponível</option>
                        <option value="Reservado">⏳ Reservado</option>
                        <option value="Vendido">✅ Vendido</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-comment"></i> OBSERVAÇÕES</label>
                    <input type="text" id="observacoes" class="form-control" placeholder="Opcional...">
                </div>
            </div>

            <div class="divider"></div>

            <!-- UPLOAD DE FOTOS -->
            <div class="form-group">
                <label class="form-label"><i class="fas fa-camera"></i> FOTOS DO VEÍCULO</label>
                <div class="upload-area" onclick="document.getElementById('fotosInput').click()">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>Clique para adicionar fotos</p>
                    <small>Máximo 5 • JPG ou PNG • 5MB cada</small>
                </div>
                
                <input type="file" id="fotosInput" multiple accept="image/*" style="display: none;" onchange="previewFotos()">
                
                <div id="fileInfo" class="file-info">
                    <i class="fas fa-check-circle"></i>
                    <span id="fileCount">0</span> foto(s) selecionada(s)
                </div>
                
                <div id="previewContainer" class="preview-container"></div>
            </div>

            <!-- BARRA DE AÇÕES -->
            <div class="action-bar">
                <div class="action-icon cancel" onclick="voltar()" title="Cancelar (ESC)">
                    <i class="fas fa-times"></i>
                </div>
                <div class="action-icon" onclick="limparFormulario()" title="Limpar campos">
                    <i class="fas fa-eraser"></i>
                </div>
                <div class="action-icon fullscreen" onclick="ativarTelaCheia()" title="Tela Cheia (F11)">
                    <i class="fas fa-expand"></i>
                </div>
                <div class="action-icon save" onclick="salvarVeiculo()" title="Salvar (Ctrl+Enter)">
                    <i class="fas fa-check"></i>
                </div>
            </div>
        </div>

        <div class="footer">
            GM REPASSES • CADASTRO DE VEÍCULOS • TODOS OS DIREITOS RESERVADOS
        </div>
    </div>

    <!-- JavaScript da página de cadastro -->
    <script src="cadastro-veiculo.js"></script>
</body>
</html>
